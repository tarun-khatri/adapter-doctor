name: Adapter Doctor scan

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional adapter cap (alphabetical, default = unlimited)"
        required: false
        default: ""
      concurrency:
        description: "Parallel test.js processes"
        required: false
        default: "6"
  schedule:
    # Sunday 02:00 UTC — weekly cadence; cheap to disable
    - cron: "0 2 * * 0"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Check out adapter-doctor
        uses: actions/checkout@v4
        with:
          path: adapter-doctor

      - name: Check out DefiLlama-Adapters @ main
        uses: actions/checkout@v4
        with:
          repository: DefiLlama/DefiLlama-Adapters
          path: DefiLlama-Adapters
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: DefiLlama-Adapters/package-lock.json

      - name: Install DefiLlama-Adapters deps
        working-directory: DefiLlama-Adapters
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run scan
        working-directory: adapter-doctor
        env:
          LIMIT: ${{ github.event.inputs.limit }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '6' }}
        run: |
          ARGS=""
          if [ -n "$LIMIT" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          ARGS="$ARGS --concurrency $CONCURRENCY"
          node src/index.js scan ../DefiLlama-Adapters --out ./out --timeout 120 $ARGS || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: adapter-doctor-report
          path: adapter-doctor/out/
          retention-days: 30

      - name: Print headline
        if: always()
        run: |
          if [ -f adapter-doctor/out/report.md ]; then
            head -20 adapter-doctor/out/report.md
          fi
